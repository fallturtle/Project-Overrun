<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Project Overrun - FPS Prototype</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
#overlay {
  position: absolute;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  background: rgba(0,0,0,0.7);
  font-family: Arial;
  cursor: pointer;
}
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
}
</style>
</head>

<body>
<div id="overlay">Click to Start</div>
<div id="hud">WASD move | Mouse look | Space jump</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let velocity = new THREE.Vector3();
let move = { f:false, b:false, l:false, r:false };
let canJump = false;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202020);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.y = 2;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // light
  const light = new THREE.HemisphereLight(0xffffff, 0x444444);
  scene.add(light);

  // ground
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x555555})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // pointer lock
  document.getElementById("overlay").onclick = () => {
    document.body.requestPointerLock();
    document.getElementById("overlay").style.display = "none";
  };

  document.addEventListener("mousemove", e=>{
    if(document.pointerLockElement === document.body){
      camera.rotation.y -= e.movementX * 0.002;
      camera.rotation.x -= e.movementY * 0.002;
    }
  });

  document.addEventListener("keydown", e=>{
    if(e.code==="KeyW") move.f=true;
    if(e.code==="KeyS") move.b=true;
    if(e.code==="KeyA") move.l=true;
    if(e.code==="KeyD") move.r=true;
    if(e.code==="Space" && canJump){
      velocity.y = 5;
      canJump = false;
    }
  });

  document.addEventListener("keyup", e=>{
    if(e.code==="KeyW") move.f=false;
    if(e.code==="KeyS") move.b=false;
    if(e.code==="KeyA") move.l=false;
    if(e.code==="KeyD") move.r=false;
  });

  window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function animate(){
  requestAnimationFrame(animate);

  let dir = new THREE.Vector3();

  if(move.f) dir.z -= 1;
  if(move.b) dir.z += 1;
  if(move.l) dir.x -= 1;
  if(move.r) dir.x += 1;

  dir.normalize();

  velocity.x = dir.x * 0.2;
  velocity.z = dir.z * 0.2;

  velocity.y -= 0.2;

  camera.position.add(velocity);

  if(camera.position.y < 2){
    camera.position.y = 2;
    velocity.y = 0;
    canJump = true;
  }

  renderer.render(scene,camera);
}
</script>

</body>
</html>
